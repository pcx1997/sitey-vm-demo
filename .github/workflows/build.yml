name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Compile SFX stub
        run: |
          cd build_sfx
          cp ../SiteyVM_Setup/icon.ico icon.ico 2>/dev/null || true
          x86_64-w64-mingw32-windres siteyvm.rc -o siteyvm_res.o
          x86_64-w64-mingw32-gcc -o siteyvm_stub.exe siteyvm_sfx.c siteyvm_res.o \
            -mwindows -lcomctl32 -lshlwapi -lshell32 -lole32 -luuid -static -O2
          echo "Stub size: $(stat -c%s siteyvm_stub.exe) bytes"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build
          echo "Frontend build size: $(du -sh build | cut -f1)"

      - name: Download Embedded Python
        run: |
          PYTHON_URL="https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          curl -L -o python-embed.zip "$PYTHON_URL"
          mkdir -p _python
          cd _python
          unzip -q ../python-embed.zip
          echo "Python embed size: $(du -sh . | cut -f1)"

      - name: Create payload ZIP
        run: |
          mkdir -p _payload/python
          mkdir -p _payload/app/backend
          mkdir -p _payload/app/frontend

          cp -r _python/* _payload/python/

          cp SiteyVM_Setup/launcher.py _payload/
          cp SiteyVM_Setup/setup_wizard.py _payload/
          cp SiteyVM_Setup/install.bat _payload/
          cp SiteyVM_Setup/SiteyVM.bat _payload/
          cp SiteyVM_Setup/SiteyVM_silent.vbs _payload/
          cp SiteyVM_Setup/KULLANIM.txt _payload/
          cp SiteyVM_Setup/icon.ico _payload/ 2>/dev/null || true

          cp backend/*.py _payload/app/backend/
          cp backend/*.json _payload/app/backend/ 2>/dev/null || true
          cp backend/*.png _payload/app/backend/ 2>/dev/null || true

          cp -r frontend/build _payload/app/frontend/build

          echo "=== Payload contents ==="
          find _payload -maxdepth 3 -type d | head -30
          echo "=== File count ==="
          find _payload -type f | wc -l

          cd _payload
          zip -r -0 ../build_sfx/payload.zip . -x "*.pyc" -x "__pycache__/*"
          cd ..
          echo "Payload ZIP size: $(du -sh build_sfx/payload.zip | cut -f1)"

      - name: Assemble SFX EXE
        run: |
          cd build_sfx
          cp siteyvm_stub.exe ../SiteyVM_Setup.exe
          cat payload.zip >> ../SiteyVM_Setup.exe
          ZIP_SIZE=$(stat -c%s payload.zip)
          python3 -c "
          import struct, sys
          sys.stdout.buffer.write(struct.pack('<II', $ZIP_SIZE, 0x564D5346))
          " >> ../SiteyVM_Setup.exe
          echo "Final EXE size: $(stat -c%s ../SiteyVM_Setup.exe) bytes"
          echo "ZIP payload size: $ZIP_SIZE bytes"
          file ../SiteyVM_Setup.exe

      - name: Generate SHA256
        run: |
          sha256sum SiteyVM_Setup.exe > SiteyVM_Setup.exe.sha256
          cat SiteyVM_Setup.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiteyVM_Setup
          path: |
            SiteyVM_Setup.exe
            SiteyVM_Setup.exe.sha256

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "sitey-vm ${{ github.ref_name }}"
          body: |
            sitey-vm ${{ github.ref_name }}

            Kurulum:
            1. SiteyVM_Setup.exe dosyasini indirin
            2. Cift tiklayarak calistirin (Yonetici olarak baslar)
            3. Dosyalar Program Files\SiteyVM altina kurulur
            4. Masaustunde kisayol olusturulur
            5. SiteyVM otomatik baslatilir

            Not: Ilk calistirmada Python bagimliliklari otomatik kurulur.
            Internet baglantisi gereklidir.
          files: |
            SiteyVM_Setup.exe
            SiteyVM_Setup.exe.sha256
